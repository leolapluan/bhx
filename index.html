<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Goods Helper</title>

  <style>
    :root {
      font-family: Inter, system-ui, sans-serif;
      color: #172033;
      background: #f5f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      background: #172033;
      color: white;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
    }

    button:hover {
      opacity: 0.9;
    }

    button.secondary {
      background: #eef1f7;
      color: #172033;
    }

    button.danger {
      background: #ffe8e8;
      color: #b42318;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 32px auto;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 20px;
      padding: 28px;
      border-radius: 28px;
      color: white;
      background: linear-gradient(135deg, #172033, #42526e);
    }

    .eyebrow {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 12px;
      opacity: .75;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 8px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    .subtext {
      margin-bottom: 0;
      color: #dce3f3;
    }

    .hero-card {
      min-width: 150px;
      padding: 20px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 24px;
      text-align: center;
    }

    .hero-card span {
      display: block;
      font-size: 44px;
      font-weight: 900;
    }

    .hero-card small {
      color: #dce3f3;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: white;
      border: 1px solid #e5e9f2;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(23, 32, 51, .06);
      margin-bottom: 20px;
    }

    .form {
      display: flex;
      gap: 10px;
    }

    .form.stacked {
      flex-direction: column;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #d8deea;
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
      background: white;
      color: #172033;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #596780;
      box-shadow: 0 0 0 3px rgba(89, 103, 128, .12);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      background: #eef1f7;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .section-title p {
      margin: 0;
      color: #69758a;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .score-card {
      border: 1px solid #e5e9f2;
      border-radius: 20px;
      padding: 16px;
      background: #fbfcff;
    }

    .score-card strong {
      display: block;
      font-size: 28px;
      margin-bottom: 4px;
    }

    .score-card span {
      color: #69758a;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter {
      background: #eef1f7;
      color: #172033;
      padding: 9px 12px;
    }

    .filter.active {
      background: #172033;
      color: white;
    }

    .items {
      display: grid;
      gap: 12px;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      border: 1px solid #e5e9f2;
      border-radius: 20px;
      padding: 16px;
      background: #fbfcff;
    }

    .item.done {
      opacity: .76;
    }

    .item h3 {
      margin: 0 0 8px;
    }

    .item p {
      margin: 0 0 8px;
      color: #596780;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: #69758a;
      font-size: 14px;
    }

    .badge {
      border-radius: 999px;
      padding: 5px 9px;
      background: #eef1f7;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .helper-select {
      min-width: 150px;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: #69758a;
      border: 1px dashed #cfd6e5;
      border-radius: 18px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: #172033;
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, bottom .2s ease;
    }

    .toast.show {
      opacity: 1;
      bottom: 32px;
    }

    @media (max-width: 760px) {
      .hero,
      .grid,
      .item {
        grid-template-columns: 1fr;
      }

      .section-title {
        align-items: flex-start;
        flex-direction: column;
      }

      .form,
      .actions {
        flex-direction: column;
      }

      .helper-select {
        min-width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">Roommate shopping helper</p>
        <h1>Goods Helper</h1>
        <p class="subtext">Request goods, let someone buy them, and give responsibility points to the helper.</p>
      </div>

      <div class="hero-card">
        <span id="pendingCount">0</span>
        <small>pending requests</small>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Add roommate</h2>

        <form id="personForm" class="form">
          <input id="personName" placeholder="Name, e.g. Minh" autocomplete="off" />
          <button type="submit">Add</button>
        </form>

        <div id="peopleList" class="chips"></div>
      </div>

      <div class="panel">
        <h2>Add buying request</h2>

        <form id="itemForm" class="form stacked">
          <input id="itemTitle" placeholder="What to buy? e.g. eggs, noodles" autocomplete="off" />
          <textarea id="itemNote" placeholder="Note, quantity, brand, budget..."></textarea>

          <div class="row">
            <select id="requestedBy"></select>
            <input id="points" type="number" min="1" value="1" />
          </div>

          <button type="submit">Create request</button>
        </form>
      </div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>Scoreboard</h2>
        <p>Only helping others gives points.</p>
      </div>

      <div id="scoreboard" class="scoreboard"></div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>Buying list</h2>

        <div class="filters">
          <button class="filter active" data-filter="all">All</button>
          <button class="filter" data-filter="pending">Pending</button>
          <button class="filter" data-filter="done">Done</button>
        </div>
      </div>

      <div id="itemsList" class="items"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
